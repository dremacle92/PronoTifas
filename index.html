<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prono Les Tifas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0e1a;
      --surface: #111827;
      --border: #1e2d40;
      --gold: #f5a623;
      --silver: #a8b2c1;
      --bronze: #cd7f32;
      --green: #22c55e;
      --text: #e8edf5;
      --muted: #6b7a94;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    /* HEADER */
    header {
      text-align: center;
      padding: 48px 24px 32px;
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    .header-eyebrow {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 10px;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(48px, 10vw, 88px);
      letter-spacing: 2px;
      line-height: 1;
      color: var(--text);
    }

    h1 span { color: var(--gold); }

    .admin-link {
      position: absolute;
      top: 20px;
      right: 20px;
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      transition: color 0.2s, border-color 0.2s;
    }
    .admin-link:hover { color: var(--text); border-color: var(--muted); }

    /* LAYOUT */
    .page-layout {
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 32px;
      max-width: 1060px;
      margin: 0 auto;
      padding: 40px 20px 80px;
      align-items: start;
    }

    main {
      min-width: 0;
    }

    /* HISTORIQUE — colonne droite */
    .history-col {
      position: sticky;
      top: 24px;
    }

    .history-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }

    .history-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .history-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold);
    }

    .history-count {
      font-size: 11px;
      color: var(--muted);
      background: var(--border);
      border-radius: 20px;
      padding: 2px 8px;
    }

    .history-list {
      max-height: 520px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .history-item {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(30,45,64,0.5);
      animation: historyIn 0.4s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes historyIn {
      from { opacity: 0; transform: translateX(12px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .history-item:last-child { border-bottom: none; }

    .history-item-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .history-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    .history-time {
      font-size: 10px;
      color: var(--muted);
    }

    .history-change {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
    }

    .history-pts-before {
      color: var(--muted);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 16px;
    }

    .history-arrow { color: var(--muted); font-size: 10px; }

    .history-pts-after {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 16px;
    }

    .history-pts-after.up   { color: var(--green); }
    .history-pts-after.down { color: #ef4444; }
    .history-pts-after.same { color: var(--muted); }

    .history-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 1px 7px;
      border-radius: 20px;
      margin-left: auto;
    }

    .history-badge.up   { background: rgba(34,197,94,0.1);  color: var(--green); border: 1px solid rgba(34,197,94,0.2); }
    .history-badge.down { background: rgba(239,68,68,0.1);  color: #ef4444;      border: 1px solid rgba(239,68,68,0.2); }
    .history-badge.same { background: rgba(107,122,148,0.1); color: var(--muted); border: 1px solid var(--border); }

    .history-empty {
      padding: 32px 16px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 860px) {
      .page-layout { grid-template-columns: 1fr; }
      .history-col { position: static; }
      .history-list { max-height: 280px; }
    }

    /* NEXT MATCH — widget compact coin supérieur droit du header */
    .next-match {
      position: absolute;
      top: 16px;
      left: 16px;
      width: 350px;
      background: rgba(13,18,37,0.95);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px 12px;
      text-align: center;
      backdrop-filter: blur(8px);
      overflow: hidden;
      z-index: 10;
    }

    @media (max-width: 780px) {
      .next-match { position: static; width: 100%; margin-top: 16px; }
      header { padding-bottom: 16px; }
    }

    /* PODIUM SECTION */
    .podium-section {
      position: relative;
      margin-bottom: 44px;
      border-radius: 20px;
      overflow: hidden;
      background: linear-gradient(180deg, #0d1525 0%, var(--surface) 100%);
      border: 1px solid var(--border);
      padding: 32px 16px 0;
    }

    #podium-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    /* PODIUM TOP 3 */
    .podium {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 8px;
    }

    .podium-slot {
      flex: 1;
      max-width: 190px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      opacity: 0;
    }

    .podium-slot.first  { order: 2; animation: podiumRise 0.7s cubic-bezier(0.22,1,0.36,1) 0.1s forwards; }
    .podium-slot.second { order: 1; animation: podiumRise 0.7s cubic-bezier(0.22,1,0.36,1) 0.3s forwards; }
    .podium-slot.third  { order: 3; animation: podiumRise 0.7s cubic-bezier(0.22,1,0.36,1) 0.5s forwards; }

    @keyframes podiumRise {
      from { opacity: 0; transform: translateY(30px) scale(0.92); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }

    .podium-crown {
      font-size: 22px;
      margin-bottom: 4px;
      animation: crownFloat 2.5s ease-in-out infinite;
    }
    @keyframes crownFloat {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-5px); }
    }

    .podium-avatar {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      margin-bottom: 8px;
      position: relative;
    }

    /* Halo rotatif autour de l'avatar du 1er */
    .first .podium-avatar::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, var(--gold), transparent 40%, var(--gold) 60%, transparent 100%);
      animation: haloSpin 2s linear infinite;
      z-index: -1;
    }
    .first .podium-avatar::after {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 50%;
      background: var(--surface);
      z-index: -1;
    }
    @keyframes haloSpin { to { transform: rotate(360deg); } }

    .first .podium-avatar  { width: 72px; height: 72px; font-size: 28px; background: rgba(245,166,35,0.15); border: 2px solid var(--gold); color: var(--gold); }
    .second .podium-avatar { background: rgba(168,178,193,0.12); border: 2px solid var(--silver); color: var(--silver); }
    .third .podium-avatar  { background: rgba(205,127,50,0.12);  border: 2px solid var(--bronze); color: var(--bronze); }

    .podium-name {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }

    .podium-pts {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 30px;
      line-height: 1;
    }
    .first .podium-pts  { font-size: 42px; color: var(--gold); text-shadow: 0 0 20px rgba(245,166,35,0.5); }
    .second .podium-pts { color: var(--silver); }
    .third .podium-pts  { color: var(--bronze); }

    .podium-label {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 2px;
      margin-bottom: 12px;
    }

    .podium-block {
      width: 100%;
      border-radius: 10px 10px 0 0;
      margin-top: 12px;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 10px;
    }

    .podium-rank-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 52px;
      line-height: 1;
      opacity: 0.12;
    }

    .first .podium-block  { height: 90px;  background: linear-gradient(180deg, rgba(245,166,35,0.12) 0%, rgba(245,166,35,0.03) 100%); border-top: 2px solid var(--gold); }
    .second .podium-block { height: 58px;  background: linear-gradient(180deg, rgba(168,178,193,0.08) 0%, rgba(168,178,193,0.02) 100%); border-top: 2px solid var(--silver); }
    .third .podium-block  { height: 32px;  background: linear-gradient(180deg, rgba(205,127,50,0.08)  0%, rgba(205,127,50,0.02)  100%); border-top: 2px solid var(--bronze); }



    /* TABLE */
    .table-header {
      display: grid;
      grid-template-columns: 36px 1fr 80px;
      padding: 0 16px 8px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .table-header .pts-label { text-align: right; }

    .player-row {
      display: grid;
      grid-template-columns: 36px 1fr 80px;
      align-items: center;
      padding: 14px 16px;
      border-radius: 10px;
      margin-bottom: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      transition: border-color 0.2s;
    }

    .player-row:hover { border-color: #2e4060; }

    /* AVATAR PHOTO */
    .avatar-img {
      width: 34px; height: 34px; border-radius: 50%;
      object-fit: cover; display: block;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .avatar-img:hover { transform: scale(1.1); box-shadow: 0 0 0 2px var(--gold); }

    .podium-avatar-img {
      border-radius: 50%;
      object-fit: cover;
      display: block;
      width: 100%; height: 100%;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .podium-avatar-img:hover { transform: scale(1.05); }

    /* LIGHTBOX */
    #lightbox {
      position: fixed; inset: 0; background: rgba(0,0,0,0.88);
      display: none; align-items: center; justify-content: center;
      z-index: 1000; backdrop-filter: blur(8px);
    }
    #lightbox.open { display: flex; animation: lbIn 0.2s ease; }
    @keyframes lbIn { from{opacity:0;} to{opacity:1;} }
    #lightbox img {
      max-width: 88vw; max-height: 82vh; border-radius: 14px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.9);
      animation: lbImg 0.3s cubic-bezier(0.22,1,0.36,1);
    }
    @keyframes lbImg { from{transform:scale(0.8);opacity:0;} to{transform:scale(1);opacity:1;} }
    #lightbox-close {
      position: absolute; top: 20px; right: 24px;
      font-size: 28px; color: var(--muted); cursor: pointer; line-height: 1;
      transition: color 0.2s;
    }
    #lightbox-close:hover { color: var(--text); }
    #lightbox-name {
      position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
      font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--text);
      text-shadow: 0 2px 8px rgba(0,0,0,0.8); white-space: nowrap;
    }

    /* DERNIER — la honte */
    .player-row.loser {
      border-color: rgba(239,68,68,0.25);
      background: rgba(239,68,68,0.04);
      position: relative;
      overflow: visible;
    }

    .player-row.loser .rank { color: #ef4444; }
    .player-row.loser .player-name { color: #ef4444; }
    .player-row.loser .player-pts  { color: #ef4444; }

    .loser-boo {
      position: absolute;
      top: -22px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(239,68,68,0.9);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 20px;
      white-space: nowrap;
      animation: booFloat 2s ease-in-out infinite;
      pointer-events: none;
    }

    .loser-boo::after {
      content: '';
      position: absolute;
      bottom: -5px;
      left: 50%;
      transform: translateX(-50%);
      border-left: 5px solid transparent;
      border-right: 5px solid transparent;
      border-top: 5px solid rgba(239,68,68,0.9);
    }

    @keyframes booFloat {
      0%,100% { transform: translateX(-50%) translateY(0) rotate(-1deg); }
      33%      { transform: translateX(-50%) translateY(-4px) rotate(1deg); }
      66%      { transform: translateX(-50%) translateY(-2px) rotate(-2deg); }
    }

    .loser-emoji {
      animation: shameShake 0.5s ease-in-out infinite alternate;
      display: inline-block;
    }

    @keyframes shameShake {
      from { transform: rotate(-8deg); }
      to   { transform: rotate(8deg); }
    }

    .rank {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      color: var(--muted);
    }

    .player-info { display: flex; align-items: center; gap: 10px; }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      flex-shrink: 0;
    }

    .player-name { font-size: 14px; font-weight: 500; }

    .player-pts {
      text-align: right;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      color: var(--text);
    }

    .pts-unit {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 500;
      color: var(--muted);
      margin-left: 2px;
    }

    .next-match::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      animation: shimmer 2.5s ease-in-out infinite;
      z-index: 2;
    }

    @keyframes shimmer {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    #match-canvas {
      position: absolute;
      inset: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
    }

    .match-inner { position: relative; z-index: 1; }

    .match-eyebrow {
      font-size: 9px; font-weight: 600; letter-spacing: 2px;
      text-transform: uppercase; color: var(--gold); margin-bottom: 10px;
    }

    .match-teams {
      display: flex; align-items: center; justify-content: center;
      gap: 0; margin-bottom: 10px;
    }

    .match-team {
      display: flex; flex-direction: column; align-items: center;
      gap: 6px; flex: 1;
    }

    .match-team.home { }
    .match-team.away { }

    .flag-wrap {
      position: relative; width: 54px; height: 36px; border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.08);
    }
    .match-team.away .flag-wrap { }

    .flag-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .flag-wrap::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(120deg, rgba(255,255,255,0.15) 0%, transparent 45%, rgba(0,0,0,0.1) 100%);
      pointer-events: none;
    }
    .flag-fallback {
      background: var(--border); display: flex; align-items: center;
      justify-content: center; font-size: 10px; font-weight: 700;
      color: var(--muted); letter-spacing: 1px;
    }

    .match-team-name {
      font-size: 10px; font-weight: 600; color: var(--text);
      text-align: center; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; max-width: 70px;
    }

    .match-vs-wrap {
      display: flex; align-items: center; justify-content: center;
      width: 30px; flex-shrink: 0; padding-bottom: 18px;
    }
    .match-vs {
      font-family: 'Bebas Neue', sans-serif; font-size: 20px;
      color: var(--gold); line-height: 1;
      animation: vsPulse 1.8s ease-in-out infinite;
    }
    @keyframes vsPulse {
      0%,100% { text-shadow: 0 0 6px rgba(245,166,35,0.3); transform: scale(1); }
      50%      { text-shadow: 0 0 16px rgba(245,166,35,0.9); transform: scale(1.1); }
    }

    .match-time { font-size: 10px; color: var(--muted); margin-bottom: 8px; line-height: 1.4; }
    .match-time strong { color: var(--text); font-size: 11px; }

    .match-countdown {
      display: inline-flex; gap: 5px;
      align-items: center; justify-content: center;
    }
    .countdown-unit { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .countdown-val {
      font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--gold);
      line-height: 1; min-width: 28px; text-align: center;
      background: rgba(245,166,35,0.07); border: 1px solid rgba(245,166,35,0.15);
      border-radius: 5px; padding: 2px 4px; transition: transform 0.1s;
    }
    .countdown-lbl {
      font-size: 8px; font-weight: 600; letter-spacing: 0.5px;
      text-transform: uppercase; color: var(--muted);
    }
    .countdown-sep { font-family: 'Bebas Neue', sans-serif; font-size: 16px; color: var(--muted); margin-bottom: 10px; }

    .match-live {
      display: inline-block; background: rgba(239,68,68,0.15); color: #ef4444;
      border: 1px solid rgba(239,68,68,0.3); border-radius: 20px;
      padding: 3px 10px; font-size: 11px; font-weight: 600; letter-spacing: 1px;
      animation: pulse 1s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }


      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      animation: shimmer 2.5s ease-in-out infinite;
      z-index: 2;
    }

    @keyframes shimmer {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    #match-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .match-inner {
      position: relative;
      z-index: 1;
    }

    .match-eyebrow {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 20px;
    }

    .match-teams {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      margin-bottom: 18px;
    }

    .match-team {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      flex: 1;
      max-width: 160px;
    }

    .match-team.home { animation: crashLeft 0.8s cubic-bezier(0.22, 1, 0.36, 1) both; }
    .match-team.away { animation: crashRight 0.8s cubic-bezier(0.22, 1, 0.36, 1) both; animation-delay: 0.05s; }

    @keyframes crashLeft {
      0%   { transform: translateX(-80px) scale(0.8); opacity: 0; }
      70%  { transform: translateX(6px) scale(1.04); opacity: 1; }
      100% { transform: translateX(0) scale(1); opacity: 1; }
    }
    @keyframes crashRight {
      0%   { transform: translateX(80px) scale(0.8); opacity: 0; }
      70%  { transform: translateX(-6px) scale(1.04); opacity: 1; }
      100% { transform: translateX(0) scale(1); opacity: 1; }
    }

    .flag-wrap {
      position: relative;
      width: 96px;
      height: 64px;
      border-radius: 5px;
      overflow: hidden;
      box-shadow: 0 6px 28px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.1);
      animation: flagWave 3.5s ease-in-out infinite;
      transform-origin: left center;
      transform-style: preserve-3d;
    }

    .match-team.away .flag-wrap {
      transform-origin: right center;
      animation: flagWaveR 3.5s ease-in-out infinite;
      animation-delay: 0.6s;
    }

    @keyframes flagWave {
      0%   { transform: perspective(300px) rotateY(0deg)   rotateX(0deg)  scale(1);    filter: brightness(1) drop-shadow(0 0 0px transparent); }
      20%  { transform: perspective(300px) rotateY(-8deg)  rotateX(2deg)  scale(1.04); filter: brightness(1.2) drop-shadow(0 0 8px rgba(245,166,35,0.4)); }
      50%  { transform: perspective(300px) rotateY(4deg)   rotateX(-1deg) scale(0.97); filter: brightness(0.9); }
      80%  { transform: perspective(300px) rotateY(-5deg)  rotateX(1deg)  scale(1.02); filter: brightness(1.1); }
      100% { transform: perspective(300px) rotateY(0deg)   rotateX(0deg)  scale(1);    filter: brightness(1); }
    }
    @keyframes flagWaveR {
      0%   { transform: perspective(300px) rotateY(0deg)  rotateX(0deg)  scale(1);    filter: brightness(1); }
      20%  { transform: perspective(300px) rotateY(8deg)  rotateX(2deg)  scale(1.04); filter: brightness(1.2) drop-shadow(0 0 8px rgba(245,166,35,0.4)); }
      50%  { transform: perspective(300px) rotateY(-4deg) rotateX(-1deg) scale(0.97); filter: brightness(0.9); }
      80%  { transform: perspective(300px) rotateY(5deg)  rotateX(1deg)  scale(1.02); filter: brightness(1.1); }
      100% { transform: perspective(300px) rotateY(0deg)  rotateX(0deg)  scale(1);    filter: brightness(1); }
    }

    .flag-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .flag-wrap::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, rgba(255,255,255,0.18) 0%, transparent 45%, rgba(0,0,0,0.12) 100%);
      pointer-events: none;
    }

    .flag-fallback {
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 1px;
    }

    .match-team-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      text-align: center;
    }

    .match-vs-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      flex-shrink: 0;
      padding-bottom: 24px;
    }

    .match-vs {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 30px;
      color: var(--gold);
      line-height: 1;
      animation: vsPulse 1.8s ease-in-out infinite;
    }

    @keyframes vsPulse {
      0%, 100% { text-shadow: 0 0 8px rgba(245,166,35,0.3), 0 0 0px transparent; transform: scale(1); }
      50%       { text-shadow: 0 0 20px rgba(245,166,35,0.9), 0 0 40px rgba(245,166,35,0.3); transform: scale(1.12); }
    }

    .match-time {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .match-time strong { color: var(--text); font-size: 14px; }

    .match-countdown {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      justify-content: center;
    }

    .countdown-unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .countdown-val {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px;
      color: var(--gold);
      line-height: 1;
      min-width: 38px;
      text-align: center;
      background: rgba(245,166,35,0.07);
      border: 1px solid rgba(245,166,35,0.15);
      border-radius: 6px;
      padding: 4px 6px;
      transition: transform 0.1s;
    }

    .countdown-lbl {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .countdown-sep {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .match-live {
      display: inline-block;
      background: rgba(239,68,68,0.15);
      color: #ef4444;
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      animation: pulse 1s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }




    /* LOADING / EMPTY */
    .state-msg {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 14px;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* BULLE DON */
    .don-bubble {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
    }

    .don-toggle {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--gold);
      border: none;
      cursor: pointer;
      font-size: 22px;
      box-shadow: 0 4px 20px rgba(245,166,35,0.4);
      animation: donFloat 3s ease-in-out infinite;
      transition: transform 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .don-toggle:hover { transform: scale(1.1); }

    @keyframes donFloat {
      0%,100% { transform: translateY(0); box-shadow: 0 4px 20px rgba(245,166,35,0.4); }
      50%      { transform: translateY(-6px); box-shadow: 0 10px 28px rgba(245,166,35,0.5); }

    .don-toggle:hover { animation: none; transform: scale(1.1); }

    .don-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      width: 260px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);

    .don-panel.open { display: block; }

    @keyframes panelPop {

    }

    .don-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--gold);

      text-align: center;

    .don-option { margin-bottom: 4px; }

    .don-label {

    .don-iban {

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  function initials(name) {
    return name.trim().split(/\s+/).map(w => w[0]).join('').toUpperCase().slice(0, 2);
  }

  const COLORS = ['#3b82f6','#8b5cf6','#ec4899','#14b8a6','#f97316','#84cc16','#06b6d4','#a855f7','#f59e0b','#10b981'];

  function renderPodium(top3) {
    const section = document.getElementById('podium-section');
    const podium  = document.getElementById('podium');
    section.style.display = 'block';
    podium.innerHTML = '';

    const rankClasses = ['first', 'second', 'third'];
    const displayOrder = [1, 0, 2];
    const medals = ['🥇', '🥈', '🥉'];

    displayOrder.forEach(rankIndex => {
      const p = top3[rankIndex];
      const slot = document.createElement('div');
      slot.className = `podium-slot ${rankClasses[rankIndex]}`;
      const color = COLORS[p._index % COLORS.length];
      const avatarContent = p.avatar_url
        ? `<img class="podium-avatar-img" src="${p.avatar_url}" alt="${p.name}" onclick="openLightbox('${p.avatar_url}','${p.name.replace(/'/g,"\\'")}')">` 
        : initials(p.name);
      slot.innerHTML = `
        <div class="podium-crown">${medals[rankIndex]}</div>
        <div class="podium-avatar" style="background:${color}22;border-color:${color};color:${color};overflow:hidden">${avatarContent}</div>
        <div class="podium-name">${p.name}</div>
        <div class="podium-pts">${p.points}</div>
        <div class="podium-label">pts</div>
        <div class="podium-block"></div>
      `;
      podium.appendChild(slot);
    });

    requestAnimationFrame(() => startPodiumConfetti(top3));
  }

  let podiumRAF = null;

  function startPodiumConfetti(top3) {
    const canvas = document.getElementById('podium-canvas');
    if (!canvas) return;
    const container = canvas.parentElement;
    canvas.width  = container.offsetWidth;
    canvas.height = container.offsetHeight;
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;

    const PALETTE = [
      '#f5a623','#a8b2c1','#cd7f32',
      '#ffffff','#ffd700','#e8edf5',
      COLORS[top3[0]._index % COLORS.length],
      COLORS[top3[1]._index % COLORS.length],
      COLORS[top3[2]._index % COLORS.length],
    ];

    function makeConfetto() {
      return {
        x: Math.random() * W,
        y: -10 - Math.random() * H * 0.4,
        w: 5 + Math.random() * 7,
        h: 3 + Math.random() * 4,
        vx: (Math.random() - 0.5) * 1.2,
        vy: 1.0 + Math.random() * 2.0,
        rot: Math.random() * Math.PI * 2,
        vrot: (Math.random() - 0.5) * 0.15,
        color: PALETTE[Math.floor(Math.random() * PALETTE.length)],
        alpha: 0.7 + Math.random() * 0.3,
      };
    }

    const confetti = Array.from({length: 60}, makeConfetto);

    function tick() {
      ctx.clearRect(0, 0, W, H);

      for (const c of confetti) {
        c.x   += c.vx;
        c.y   += c.vy;
        c.vy  += 0.03;
        c.rot += c.vrot;

        // Reset en continu — toujours
        if (c.y > H + 20 || c.x < -20 || c.x > W + 20) {
          Object.assign(c, makeConfetto());
        }

        ctx.save();
        ctx.translate(c.x, c.y);
        ctx.rotate(c.rot);
        ctx.globalAlpha = c.alpha;
        ctx.fillStyle = c.color;
        ctx.fillRect(-c.w / 2, -c.h / 2, c.w, c.h);
        ctx.restore();
      }

      podiumRAF = requestAnimationFrame(tick);
    }

    if (podiumRAF) cancelAnimationFrame(podiumRAF);
    tick();
  }

  function renderList(players) {
    const el = document.getElementById('leaderboard');
    document.getElementById('table-header').style.display = 'grid';
    if (players.length === 0) {
      el.innerHTML = '<div class="state-msg">Aucun joueur pour le moment.</div>';
      return;
    }
    const rest = players.slice(3);
    el.innerHTML = rest.map((p, i) => {
      const rank = i + 4;
      const color = COLORS[p._index % COLORS.length];
      const isLast = (i === rest.length - 1) && players.length > 1;
      const boos = ['😬 Ouuuuh nul !', '🍌 Dernier...', '💀 Honte à toi', '🤦 T\'es sérieux ?'];
      const boo = boos[p.id % boos.length];
      const avatarContent = p.avatar_url
        ? `<img class="avatar-img" src="${p.avatar_url}" alt="${p.name}" onclick="openLightbox('${p.avatar_url}','${p.name.replace(/'/g,"\\'")}')">` 
        : (isLast ? `<span class="loser-emoji">😢</span>` : initials(p.name));
      const avatarStyle = p.avatar_url ? '' : `style="background:${color}22;color:${color}"`;
      return `
        <div class="player-row${isLast ? ' loser' : ''}">
          ${isLast ? `<span class="loser-boo">${boo}</span>` : ''}
          <span class="rank">${isLast ? '💩' : rank}</span>
          <div class="player-info">
            <div class="avatar" ${avatarStyle}>${avatarContent}</div>
            <span class="player-name">${p.name}</span>
          </div>
          <span class="player-pts">${p.points}<span class="pts-unit">pts</span></span>
        </div>
      `;
    }).join('');
  }

  async function load() {
    const { data, error } = await db
      .from('players')
      .select('*')
      .order('points', { ascending: false });

    if (error) {
      document.getElementById('leaderboard').innerHTML =
        '<div class="state-msg">Erreur de chargement. Vérifie la config Supabase.</div>';
      return;
    }

    const players = (data || []).map((p, i) => ({ ...p, _index: i }));

    if (players.length >= 3) renderPodium(players.slice(0, 3));
    renderList(players);
  }

  // ── PROCHAIN MATCH ──────────────────────────────────────────
  const TLA_TO_ISO = {
    'ARG':'ar','BRA':'br','FRA':'fr','ESP':'es','ENG':'gb-eng',
    'GER':'de','ITA':'it','POR':'pt','NED':'nl','BEL':'be',
    'URU':'uy','CHI':'cl','COL':'co','MEX':'mx','USA':'us',
    'CAN':'ca','JPN':'jp','KOR':'kr','MAR':'ma','SEN':'sn',
    'GHA':'gh','CMR':'cm','TUN':'tn','EGY':'eg','NGA':'ng',
    'CIV':'ci','AUS':'au','IRN':'ir','KSA':'sa','QAT':'qa',
    'ECU':'ec','SRB':'rs','CRO':'hr','DEN':'dk','SUI':'ch',
    'POL':'pl','WAL':'gb-wls','SCO':'gb-sct','SVN':'si','SVK':'sk',
    'HUN':'hu','AUT':'at','UKR':'ua','TUR':'tr','GRE':'gr',
    'CZE':'cz','SWE':'se','NOR':'no','FIN':'fi','ALB':'al',
    'GEO':'ge','ROU':'ro','ISL':'is','IRL':'ie','VEN':'ve',
    'PER':'pe','PAR':'py','BOL':'bo','HON':'hn','CRC':'cr',
    'PAN':'pa','JAM':'jm','HAI':'ht','NZL':'nz','IDN':'id',
    'CHN':'cn','IRQ':'iq','JOR':'jo','ALG':'dz','MLI':'ml',
    'ZAF':'za','KEN':'ke','ETH':'et','UGA':'ug','RWA':'rw',
    'ANG':'ao','MOZ':'mz','ZIM':'zw','ZAM':'zm',
    'BIH':'ba','MNE':'me','MKD':'mk','KVX':'xk','ARM':'am',
    'SLV':'sv','GTM':'gt','CUB':'cu','DOM':'do','TTO':'tt',
    'VIE':'vn','THA':'th','IND':'in','PHI':'ph','MYS':'my',
    'BLR':'by','MDA':'md','LTU':'lt','LVA':'lv','EST':'ee',
    'LUX':'lu','ISR':'il','CYP':'cy','UZB':'uz','KAZ':'kz','AZE':'az',
  };

  function getFlagImg(tla, name) {
    const iso = TLA_TO_ISO[tla];
    if (!iso) return `<div class="flag-wrap flag-fallback"><span>${tla || '?'}</span></div>`;
    return `<div class="flag-wrap"><img src="https://flagcdn.com/w160/${iso}.png" alt="${name}" loading="lazy" onerror="this.parentElement.classList.add('flag-fallback');this.parentElement.innerHTML='<span>${tla}</span>'"></div>`;
  }

  // ── CANVAS PARTICULES (étincelles dorées au centre) ──────────
  let particleRAF = null;

  function startParticles() {
    const canvas = document.getElementById('match-canvas');
    if (!canvas) return;
    const container = canvas.parentElement;
    canvas.width  = container.offsetWidth;
    canvas.height = container.offsetHeight;
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    const cx = W / 2, cy = H * 0.52;

    const particles = Array.from({length: 42}, () => resetParticle({}, cx, cy));

    function resetParticle(p, x, y) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 0.3 + Math.random() * 0.7;
      p.x = x + (Math.random() - 0.5) * 20;
      p.y = y + (Math.random() - 0.5) * 10;
      p.vx = Math.cos(angle) * speed * 0.5;
      p.vy = -(0.5 + Math.random() * 1.0);
      p.r  = 1.2 + Math.random() * 2.2;
      p.life = Math.random();
      p.maxLife = 0.5 + Math.random() * 0.5;
      p.hue = 28 + Math.random() * 25;
      return p;
    }

    function tick() {
      ctx.clearRect(0, 0, W, H);
      for (const p of particles) {
        p.x  += p.vx;
        p.y  += p.vy;
        p.vy -= 0.014;
        p.vx *= 0.99;
        p.life += 0.007;
        if (p.life >= p.maxLife) resetParticle(p, cx, cy);

        const t = p.life / p.maxLife;
        const alpha = t < 0.15 ? t / 0.15 : 1 - (t - 0.15) / 0.85;
        const radius = p.r * (1 - t * 0.4);

        const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, radius * 2);
        grad.addColorStop(0, `hsla(${p.hue}, 100%, 75%, ${alpha * 0.9})`);
        grad.addColorStop(1, `hsla(${p.hue}, 100%, 50%, 0)`);
        ctx.beginPath();
        ctx.arc(p.x, p.y, radius * 2, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();
      }
      particleRAF = requestAnimationFrame(tick);
    }
    if (particleRAF) cancelAnimationFrame(particleRAF);
    tick();
  }

  // ── COUNTDOWN ────────────────────────────────────────────────
  let countdownInterval = null;
  let prevSeconds = -1;

  function renderCountdown(matchDate) {
    const el = document.getElementById('match-countdown-inner');
    if (!el) return;
    const diff = matchDate - new Date();
    if (diff <= 0) {
      el.innerHTML = '<span class="match-live">🔴 EN DIRECT</span>';
      clearInterval(countdownInterval);
      return;
    }
    const days    = Math.floor(diff / 86400000);
    const hours   = Math.floor((diff % 86400000) / 3600000);
    const minutes = Math.floor((diff % 3600000) / 60000);
    const seconds = Math.floor((diff % 60000) / 1000);

    if (seconds !== prevSeconds) {
      prevSeconds = seconds;
      const secEl = document.getElementById('cd-sec');
      if (secEl) { secEl.style.transform = 'scale(1.2)'; setTimeout(() => secEl.style.transform = '', 100); }
    }

    const parts = [];
    if (days > 0) parts.push(`<div class="countdown-unit"><span class="countdown-val">${String(days).padStart(2,'0')}</span><span class="countdown-lbl">jours</span></div><span class="countdown-sep">:</span>`);
    parts.push(`<div class="countdown-unit"><span class="countdown-val">${String(hours).padStart(2,'0')}</span><span class="countdown-lbl">heures</span></div>`);
    parts.push(`<span class="countdown-sep">:</span><div class="countdown-unit"><span class="countdown-val">${String(minutes).padStart(2,'0')}</span><span class="countdown-lbl">min</span></div>`);
    parts.push(`<span class="countdown-sep">:</span><div class="countdown-unit"><span class="countdown-val" id="cd-sec">${String(seconds).padStart(2,'0')}</span><span class="countdown-lbl">sec</span></div>`);
    el.innerHTML = `<div class="match-countdown">${parts.join('')}</div>`;
  }

  async function loadNextMatch() {
    const el = document.getElementById('next-match');
    const inner = document.getElementById('match-inner');
    try {
      const res = await fetch('/api/match');
      if (!res.ok) throw new Error();
      const data = await res.json();
      const matches = data.matches || [];
      if (!matches.length) throw new Error();

      const m = matches[0];
      const home = m.homeTeam, away = m.awayTeam;
      const matchDate = new Date(m.utcDate);
      const timeStr = matchDate.toLocaleString('fr-BE', {
        timeZone: 'Europe/Brussels',
        weekday: 'long', day: 'numeric', month: 'long',
        hour: '2-digit', minute: '2-digit'
      });

      el.style.display = 'block';
      inner.innerHTML = `
        <div class="match-eyebrow">⚽ Prochain match · Coupe du Monde 2026</div>
        <div class="match-teams">
          <div class="match-team home">
            ${getFlagImg(home.tla, home.name)}
            <span class="match-team-name">${home.name}</span>
          </div>
          <div class="match-vs-wrap"><span class="match-vs">VS</span></div>
          <div class="match-team away">
            ${getFlagImg(away.tla, away.name)}
            <span class="match-team-name">${away.name}</span>
          </div>
        </div>
        <div class="match-time"><strong>${timeStr}</strong> (heure belge)</div>
        <div id="match-countdown-inner"></div>
      `;

      renderCountdown(matchDate);
      clearInterval(countdownInterval);
      countdownInterval = setInterval(() => renderCountdown(matchDate), 1000);
      requestAnimationFrame(startParticles);

    } catch (e) {
      el.style.display = 'none';
    }
  }


  load();
  loadNextMatch();
  // Rafraîchir le prochain match toutes les 5 minutes
  setInterval(loadNextMatch, 5 * 60 * 1000);


  // ── DON ─────────────────────────────────────────────────────
  function toggleDon() {
    const panel = document.getElementById('don-panel');
    panel.classList.toggle('open');
  }

  function copyIban(iban, btn) {
    navigator.clipboard.writeText(iban).then(() => {
      const orig = btn.textContent;
      btn.textContent = '✓ Copié !';
      btn.style.background = 'rgba(34,197,94,0.15)';
      btn.style.borderColor = 'rgba(34,197,94,0.3)';
      btn.style.color = '#22c55e';
      setTimeout(() => {
        btn.textContent = orig;
        btn.style.background = '';
        btn.style.borderColor = '';
        btn.style.color = '';
      }, 2000);
    });
  }

  function openLightbox(url, name) {
    document.getElementById('lightbox-img').src = url;
    document.getElementById('lightbox-name').textContent = name;
    document.getElementById('lightbox').classList.add('open');
  }
  function closeLightbox(e) {
    if (!e || e.target === document.getElementById('lightbox') || e.target === document.getElementById('lightbox-close'))
      document.getElementById('lightbox').classList.remove('open');
  }
  document.addEventListener('keydown', e => { if(e.key==='Escape') document.getElementById('lightbox').classList.remove('open'); });

  // ── HISTORIQUE ───────────────────────────────────────────────
  function timeAgo(dateStr) {
    const diff = Math.floor((new Date() - new Date(dateStr)) / 1000);
    if (diff < 60)  return 'à l\'instant';
    if (diff < 3600) return `il y a ${Math.floor(diff/60)} min`;
    if (diff < 86400) return `il y a ${Math.floor(diff/3600)}h`;
    return `il y a ${Math.floor(diff/86400)}j`;
  }

  async function loadHistory() {
    const { data } = await db
      .from('history')
      .select('*')
      .order('changed_at', { ascending: false })
      .limit(50);

    const list = document.getElementById('history-list');
    const count = document.getElementById('history-count');
    if (!data || data.length === 0) {
      list.innerHTML = '<div class="history-empty">Aucun changement pour le moment.</div>';
      count.textContent = '0';
      return;
    }

    count.textContent = data.length;
    list.innerHTML = data.map((h, i) => {
      const diff = h.pts_after - h.pts_before;
      const dir = diff > 0 ? 'up' : diff < 0 ? 'down' : 'same';
      const badge = diff > 0 ? `+${diff} pts` : diff < 0 ? `${diff} pts` : '= pts';
      return `
        <div class="history-item" style="animation-delay:${i * 0.03}s">
          <div class="history-item-top">
            <span class="history-name">${h.player_name}</span>
            <span class="history-time">${timeAgo(h.changed_at)}</span>
          </div>
          <div class="history-change">
            <span class="history-pts-before">${h.pts_before}</span>
            <span class="history-arrow">→</span>
            <span class="history-pts-after ${dir}">${h.pts_after} pts</span>
            <span class="history-badge ${dir}">${badge}</span>
          </div>
        </div>
      `;
    }).join('');
  }

  loadHistory();

  db.channel('history-realtime')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'history' }, loadHistory)
    .subscribe();

  // Realtime updates
  db.channel('players').on('postgres_changes', { event: '*', schema: 'public', table: 'players' }, load).subscribe();

  // ── DON ─────────────────────────────────────────────────────
  function toggleDon() {
    document.getElementById('don-panel').classList.toggle('open');
  }
  function copyIban(iban, btn) {
    navigator.clipboard.writeText(iban).then(() => {
      const orig = btn.textContent;
      btn.textContent = '✓ Copié !';
      btn.style.cssText += 'background:rgba(34,197,94,0.15);border-color:rgba(34,197,94,0.3);color:#22c55e';
      setTimeout(() => { btn.textContent = orig; btn.style.cssText = ''; }, 2000);
    });
  }
  document.addEventListener('click', e => {
    if (!document.getElementById('don-bubble').contains(e.target))
      document.getElementById('don-panel').classList.remove('open');
  });
</script>
</body>
</html>
