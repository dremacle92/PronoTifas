<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prono Les Tifas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0e1a;
      --surface: #111827;
      --border: #1e2d40;
      --gold: #f5a623;
      --silver: #a8b2c1;
      --bronze: #cd7f32;
      --green: #22c55e;
      --text: #e8edf5;
      --muted: #6b7a94;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    /* HEADER */
    header {
      text-align: center;
      padding: 48px 24px 32px;
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    .header-eyebrow {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 10px;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(48px, 10vw, 88px);
      letter-spacing: 2px;
      line-height: 1;
      color: var(--text);
    }

    h1 span {
      color: var(--gold);
    }

    .admin-link {
      position: absolute;
      top: 20px;
      right: 20px;
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      transition: color 0.2s, border-color 0.2s;
    }
    .admin-link:hover { color: var(--text); border-color: var(--muted); }

    /* MAIN */
    main {
      max-width: 680px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }

    /* PODIUM TOP 3 */
    .podium {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 12px;
      margin-bottom: 40px;
    }

    .podium-slot {
      flex: 1;
      max-width: 180px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .podium-slot.first { order: 2; }
    .podium-slot.second { order: 1; }
    .podium-slot.third { order: 3; }

    .podium-avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      margin-bottom: 8px;
    }

    .first .podium-avatar { width: 68px; height: 68px; font-size: 26px; background: rgba(245,166,35,0.15); border: 2px solid var(--gold); color: var(--gold); }
    .second .podium-avatar { background: rgba(168,178,193,0.12); border: 2px solid var(--silver); color: var(--silver); }
    .third .podium-avatar { background: rgba(205,127,50,0.12); border: 2px solid var(--bronze); color: var(--bronze); }

    .podium-name {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }

    .podium-pts {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      line-height: 1;
    }
    .first .podium-pts { font-size: 36px; color: var(--gold); }
    .second .podium-pts { color: var(--silver); }
    .third .podium-pts { color: var(--bronze); }

    .podium-label {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .podium-block {
      width: 100%;
      border-radius: 8px 8px 0 0;
      margin-top: 12px;
    }
    .first .podium-block { height: 60px; background: rgba(245,166,35,0.08); border-top: 2px solid var(--gold); }
    .second .podium-block { height: 36px; background: rgba(168,178,193,0.05); border-top: 2px solid var(--silver); }
    .third .podium-block { height: 20px; background: rgba(205,127,50,0.05); border-top: 2px solid var(--bronze); }

    /* TABLE */
    .table-header {
      display: grid;
      grid-template-columns: 36px 1fr 80px;
      padding: 0 16px 8px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .table-header .pts-label { text-align: right; }

    .player-row {
      display: grid;
      grid-template-columns: 36px 1fr 80px;
      align-items: center;
      padding: 14px 16px;
      border-radius: 10px;
      margin-bottom: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      transition: border-color 0.2s;
    }

    .player-row:hover { border-color: #2e4060; }

    .rank {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      color: var(--muted);
    }

    .player-info { display: flex; align-items: center; gap: 10px; }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      flex-shrink: 0;
    }

    .player-name { font-size: 14px; font-weight: 500; }

    .player-pts {
      text-align: right;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      color: var(--text);
    }

    .pts-unit {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 500;
      color: var(--muted);
      margin-left: 2px;
    }

    /* LOADING / EMPTY */
    .state-msg {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 14px;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 20px;
      font-size: 11px;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

<header>
  <div class="header-eyebrow">⚽ Classement officiel</div>
  <h1>Prono <span>Les Tifas</span></h1>
  <a href="admin.html" class="admin-link">Admin</a>
</header>

<main>
  <div id="podium" class="podium" style="display:none"></div>
  <div class="table-header" id="table-header" style="display:none">
    <span>#</span>
    <span>Joueur</span>
    <span class="pts-label">Pts</span>
  </div>
  <div id="leaderboard">
    <div class="state-msg"><div class="spinner"></div>Chargement…</div>
  </div>
</main>

<footer>Mis à jour en temps réel · Prono Les Tifas 2026</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  function initials(name) {
    return name.trim().split(/\s+/).map(w => w[0]).join('').toUpperCase().slice(0, 2);
  }

  const COLORS = ['#3b82f6','#8b5cf6','#ec4899','#14b8a6','#f97316','#84cc16','#06b6d4','#a855f7','#f59e0b','#10b981'];

  function renderPodium(top3) {
    const podium = document.getElementById('podium');
    podium.style.display = 'flex';
    // classes[i] = style du rang i+1 (0=1er, 1=2e, 2=3e)
    const rankClasses = ['first', 'second', 'third'];
    // Ordre d'affichage visuel : 2e à gauche, 1er au centre, 3e à droite
    const displayOrder = [1, 0, 2]; // index dans top3 → position visuelle
    podium.innerHTML = '';
    // Créer les slots dans l'ordre d'affichage (2e, 1er, 3e)
    displayOrder.forEach(rankIndex => {
      const p = top3[rankIndex];
      const slot = document.createElement('div');
      slot.className = `podium-slot ${rankClasses[rankIndex]}`;
      const color = COLORS[p._index % COLORS.length];
      slot.innerHTML = `
        <div class="podium-avatar" style="background:${color}22;border-color:${color};color:${color}">${initials(p.name)}</div>
        <div class="podium-name">${p.name}</div>
        <div class="podium-pts">${p.points}</div>
        <div class="podium-label">pts</div>
        <div class="podium-block"></div>
      `;
      podium.appendChild(slot);
    });
  }

  function renderList(players) {
    const el = document.getElementById('leaderboard');
    document.getElementById('table-header').style.display = 'grid';
    if (players.length === 0) {
      el.innerHTML = '<div class="state-msg">Aucun joueur pour le moment.</div>';
      return;
    }
    el.innerHTML = players.slice(3).map((p, i) => {
      const rank = i + 4;
      const color = COLORS[p._index % COLORS.length];
      return `
        <div class="player-row">
          <span class="rank">${rank}</span>
          <div class="player-info">
            <div class="avatar" style="background:${color}22;color:${color}">${initials(p.name)}</div>
            <span class="player-name">${p.name}</span>
          </div>
          <span class="player-pts">${p.points}<span class="pts-unit">pts</span></span>
        </div>
      `;
    }).join('');
  }

  async function load() {
    const { data, error } = await db
      .from('players')
      .select('*')
      .order('points', { ascending: false });

    if (error) {
      document.getElementById('leaderboard').innerHTML =
        '<div class="state-msg">Erreur de chargement. Vérifie la config Supabase.</div>';
      return;
    }

    const players = (data || []).map((p, i) => ({ ...p, _index: i }));

    if (players.length >= 3) renderPodium(players.slice(0, 3));
    renderList(players);
  }

  load();

  // Realtime updates
  db.channel('players').on('postgres_changes', { event: '*', schema: 'public', table: 'players' }, load).subscribe();
</script>
</body>
</html>
